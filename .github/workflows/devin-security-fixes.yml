name: "Devin Security Fixes"

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["CodeQL"]
        types:
            - completed

jobs:
    devin-security-fixes:
        runs-on: ubuntu-latest

        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Download CodeQL Output
            env: 
                GH_TOKEN: ${{ secrets.GH_TOKEN }}
            run: |
                RUN_ID=$(gh run list --workflow "CodeQL Scan" --status success --limit 1 --json databaseId --jq '.[0].databaseId')

                echo "Run ID: $RUN_ID"

                gh run download $RUN_ID --name github-codeql-sarif --dir ./

                ls -R

          - name: Setup Python
            uses: actions/setup-python@v4
            with:
              python-version: "3.10"

          - name: Install dependencies
            run: |
                python -m pip install --upgrade pip
                pip install requests
          - name: Run Devin Issuer
            env:
              DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
              GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
            run: |
              python .github/scripts/devin_issuer.py
